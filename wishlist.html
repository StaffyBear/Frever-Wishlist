<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishlist · Frever Wishlist</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/main.css">
<script type="module" src="js/wishlist.js" defer></script>
</head>
<body>
<main class="app">
<a class="back" href="wishlists.html">← Wishlists</a>

<div class="header-row">
  <div>
    <h1 class="page-title" id="title">Wishlist</h1>
    <p class="page-intro" id="subtitle">Gift ideas selected by parents.</p>
  </div>
  <button class="icon-btn" id="settingsBtn" type="button">⚙️</button>
</div>

<section class="controls">
  <input id="search" type="search" placeholder="Search gifts...">
  <select id="sort">
    <option value="newest">Newest first</option>
    <option value="oldest">Oldest first</option>
    <option value="priceLow">Price: low to high</option>
    <option value="priceHigh">Price: high to low</option>
    <option value="nameAZ">Name A-Z</option>
  </select>
</section>

<div class="header-row" style="margin:18px 0 12px;">
  <h2 class="section-title" style="margin:0;">Gift ideas</h2>
  <button class="fab" id="addGiftBtn" type="button">+</button>
</div>

<section id="giftList" class="grid"></section>

<div class="modal-backdrop" id="addGiftModal"><section class="modal"><h2>Add Gift</h2>
<form id="addGiftForm" class="form">
<div><label>Gift name</label><input id="addGiftName" required></div>
<div><label>Gift URL</label><input id="addGiftUrl" type="url"></div>
<div><label>Image URL</label><input id="addGiftImage" type="url"></div>
<div><label>Cost</label><input id="addGiftCost" type="number" step="0.01"></div>
<div><label>Quantity</label><input id="addGiftQty" type="number" min="1" value="1"></div>
<div><label>Priority</label><select id="addGiftPriority"><option>High</option><option>Medium</option><option>Low</option><option selected>N/A</option></select></div>
<div><label>Status</label><select id="addGiftStatus"><option selected>Available</option><option>Reserved</option><option>Purchased</option></select></div>
<div><label>Notes</label><textarea id="addGiftNotes"></textarea></div>
<div class="modal-actions"><button class="btn full" type="submit">Add gift</button><button class="btn secondary full" type="button" id="closeAddGift">Cancel</button></div>
</form></section></div>

<div class="modal-backdrop" id="editGiftModal"><section class="modal"><h2>Edit Gift</h2>
<form id="editGiftForm" class="form">
<input id="editGiftId" type="hidden">
<div><label>Gift name</label><input id="editGiftName" required></div>
<div><label>Gift URL</label><input id="editGiftUrl" type="url"></div>
<div><label>Image URL</label><input id="editGiftImage" type="url"></div>
<div><label>Cost</label><input id="editGiftCost" type="number" step="0.01"></div>
<div><label>Quantity</label><input id="editGiftQty" type="number" min="1"></div>
<div><label>Priority</label><select id="editGiftPriority"><option>High</option><option>Medium</option><option>Low</option><option>N/A</option></select></div>
<div><label>Status</label><select id="editGiftStatus"><option>Available</option><option>Reserved</option><option>Purchased</option></select></div>
<div><label>Notes</label><textarea id="editGiftNotes"></textarea></div>
<div class="modal-actions"><button class="btn full" type="submit">Save gift</button><button class="btn secondary full" type="button" id="closeEditGift">Cancel</button></div>
</form></section></div>

<div class="modal-backdrop" id="wishlistModal"><section class="modal"><h2>Wishlist Settings</h2>
<form id="wishlistForm" class="form">
<div id="ownerSettings">
  <div><label>Person name</label><input id="editPerson" required></div>
  <div><label>Share code</label><input id="editCode" maxlength="5" required></div>
</div>

<div id="viewerSettings" class="stack" style="margin-top:10px;"></div>

<div id="viewerListWrap" style="margin-top:14px;">
  <h3>Who can view this wishlist</h3>
  <div id="viewerList" class="stack"></div>
</div>

<div class="modal-actions">
  <button class="btn full" id="saveWishlistBtn" type="submit">Save wishlist</button>
  <button class="btn secondary full" type="button" id="copyCode">Copy code</button>
  <button class="btn danger full" type="button" id="deleteWishlistBtn">Delete wishlist</button>
  <button class="btn danger full" type="button" id="removeSharedWishlistBtn">Remove from my account</button>
  <button class="btn secondary full" type="button" id="closeWishlist">Cancel</button>
</div>
</form></section></div>

<nav class="bottom-nav">
<a href="home.html">Home</a>
<a href="wishlists.html" class="active">Lists</a>
<a href="purchases.html">Bought</a>
<a href="profile.html">Profile</a>
</nav>
</main>
</body>
</html>
