<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Wishlist · Frever Wishlist</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/main.css"><script type="module" src="js/app.js" defer></script></head><body data-page="wishlist"><main class="app-shell"><a class="back-link" href="wishlists.html">← Wishlists</a><div class="inline-header"><div><h1 class="page-title" id="wishlistTitle">Wishlist</h1><p class="page-intro">Gift ideas selected by parents. Purchased items do not show who bought them.</p></div><button class="icon-button" id="openWishlistSettings" type="button" title="Edit wishlist">⚙️</button></div><section class="search-row"><input id="giftSearch" type="search" placeholder="Search gifts..."><select id="sortFilter"><option value="newest">Newest first</option><option value="oldest">Oldest first</option><option value="priceLow">Price: low to high</option><option value="priceHigh">Price: high to low</option><option value="nameAZ">Name A-Z</option></select></section><div class="inline-header" style="margin-top:18px;"><h2 class="section-title" style="margin:0;">Gift ideas</h2><button class="fab-add" id="openAddGiftModal" type="button" title="Add gift">+</button></div><section class="list" id="giftList"></section><div class="modal-backdrop" id="addGiftModalBackdrop"><section class="modal"><h2>Add Gift</h2><form class="form" id="addGiftForm"><div><label for="addGiftName">Gift name</label><input id="addGiftName" required placeholder="Wooden train set"></div><div><label for="addGiftUrl">Gift URL</label><input id="addGiftUrl" type="url" placeholder="https://www.smythstoys.com/..."></div><div><label for="addGiftImageUrl">Image URL</label><input id="addGiftImageUrl" type="url" placeholder="Optional"></div><div><label for="addGiftCost">Cost</label><input id="addGiftCost" type="number" step="0.01" placeholder="29.99"></div><div><label for="addGiftQuantity">Quantity</label><input id="addGiftQuantity" type="number" min="1" value="1"></div><div><label for="addGiftPriority">Priority</label><select id="addGiftPriority"><option>High</option><option>Medium</option><option>Low</option><option selected>N/A</option></select></div><div><label for="addGiftNotes">Notes</label><textarea id="addGiftNotes" placeholder="Size, colour, exact version, etc."></textarea></div><div class="modal-actions"><button class="btn full" type="submit">Add gift</button><button class="btn secondary full" type="button" id="closeAddGiftModal">Cancel</button></div></form></section></div><div class="modal-backdrop" id="giftModalBackdrop"><section class="modal"><h2>Edit Gift</h2><form class="form" id="editGiftForm"><input id="editGiftId" type="hidden"><div><label for="editGiftName">Gift name</label><input id="editGiftName" required></div><div><label for="editGiftUrl">Gift URL</label><input id="editGiftUrl" type="url"></div><div><label for="editGiftImageUrl">Image URL</label><input id="editGiftImageUrl" type="url"></div><div><label for="editGiftCost">Cost</label><input id="editGiftCost" type="number" step="0.01"></div><div><label for="editGiftQuantity">Quantity</label><input id="editGiftQuantity" type="number" min="1"></div><div><label for="editGiftPriority">Priority</label><select id="editGiftPriority"><option>High</option><option>Medium</option><option>Low</option><option>N/A</option></select></div><div><label for="editGiftStatus">Status</label><select id="editGiftStatus"><option>Available</option><option>Reserved</option><option>Purchased</option></select></div><div><label for="editGiftNotes">Notes</label><textarea id="editGiftNotes"></textarea></div><div class="modal-actions"><button class="btn full" type="submit">Save gift</button><button class="btn secondary full" type="button" id="closeGiftModal">Cancel</button></div></form></section></div><div class="modal-backdrop" id="wishlistModalBackdrop"><section class="modal"><h2>Edit Wishlist</h2><form class="form" id="editWishlistForm"><input id="editWishlistId" type="hidden"><div><label for="editWishlistPerson">Person name</label><input id="editWishlistPerson" required></div><div><label for="editWishlistCode">Share code</label><input id="editWishlistCode" required maxlength="5"></div><div class="modal-actions"><button class="btn full" type="submit">Save wishlist</button><button class="btn secondary full" type="button" id="copyWishlistCode">Copy code</button><button class="btn secondary full" type="button" id="closeWishlistModal">Cancel</button></div></form></section></div><nav class="bottom-nav"><a href="dashboard.html">Home</a><a href="wishlists.html" class="active">Lists</a><a href="purchases.html">Bought</a><a href="profile.html">Profile</a></nav></main></body></html>
