<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Wishlist · Frever Wishlist</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/main.css"><script type="module" src="js/app.js" defer></script></head><body data-page="wishlist"><main class="app-shell"><a class="back-link" href="wishlists.html">← Wishlists</a><div class="inline-header"><div><h1 class="page-title" id="wishlistTitle">Wishlist</h1><p class="page-intro">Gift ideas selected by parents. Purchased items do not show who bought them.</p></div><button class="icon-button" id="openWishlistSettings" type="button">⚙️</button></div><section class="search-row"><input id="giftSearch" type="search" placeholder="Search gifts..."><select id="statusFilter"><option value="All">All statuses</option><option value="Available">Available</option><option value="Reserved">Reserved</option><option value="Purchased">Purchased</option></select><select id="priorityFilter"><option value="All">All priorities</option><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option><option value="N/A">N/A</option></select><select id="sortFilter"><option value="newest">Newest first</option><option value="oldest">Oldest first</option><option value="priceLow">Price: low to high</option><option value="priceHigh">Price: high to low</option><option value="nameAZ">Name A-Z</option></select></section><section class="list" id="giftList"></section><div class="modal-backdrop" id="giftModalBackdrop"><section class="modal"><h2>Edit Gift</h2><form class="form" id="editGiftForm"><input id="editGiftId" type="hidden"><div><label for="editGiftName">Gift name</label><input id="editGiftName" required></div><div><label for="editGiftUrl">Gift URL</label><input id="editGiftUrl" type="url"></div><div><label for="editGiftImageUrl">Image URL</label><input id="editGiftImageUrl" type="url"></div><div><label for="editGiftCost">Cost</label><input id="editGiftCost" type="number" step="0.01"></div><div><label for="editGiftQuantity">Quantity</label><input id="editGiftQuantity" type="number" min="1"></div><div><label for="editGiftPriority">Priority</label><select id="editGiftPriority"><option>High</option><option>Medium</option><option>Low</option><option>N/A</option></select></div><div><label for="editGiftStatus">Status</label><select id="editGiftStatus"><option>Available</option><option>Reserved</option><option>Purchased</option></select></div><div><label for="editGiftNotes">Notes</label><textarea id="editGiftNotes"></textarea></div><div class="modal-actions"><button class="btn full" type="submit">Save gift</button><button class="btn secondary full" type="button" id="closeGiftModal">Cancel</button></div></form></section></div><div class="modal-backdrop" id="wishlistModalBackdrop"><section class="modal"><h2>Edit Wishlist</h2><form class="form" id="editWishlistForm"><input id="editWishlistId" type="hidden"><div><label for="editWishlistPerson">Person name</label><input id="editWishlistPerson" required></div><div><label for="editWishlistCode">Share code</label><input id="editWishlistCode" required maxlength="5"></div><div class="modal-actions"><button class="btn full" type="submit">Save wishlist</button><button class="btn secondary full" type="button" id="copyWishlistCode">Copy code</button><button class="btn secondary full" type="button" id="closeWishlistModal">Cancel</button></div></form></section></div><nav class="bottom-nav"><a href="dashboard.html">Home</a><a href="wishlists.html" class="active">Lists</a><a href="purchases.html">Bought</a><a href="profile.html">Profile</a></nav></main></body></html>
