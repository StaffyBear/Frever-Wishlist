<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Wishlists · Frever Wishlist</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="css/main.css"><script type="module" src="js/wishlists.js" defer></script></head><body><main class="app"><a class="back" href="home.html">← Home</a><h1 class="page-title">All Wishlists</h1><p class="page-intro">Create gift recipients, view your own wishlists and access wishlists shared with you.</p><section class="card"><h2>Create Wishlist</h2><form id="createWishlistForm" class="form"><div><label>Person name</label><input id="personName" placeholder="Freddie" required></div><div><label>Wishlist code</label><input id="wishlistCode" maxlength="5" required></div><button class="btn secondary full" type="button" id="newCodeBtn">Generate new code</button><button class="btn full" type="submit">Create wishlist</button><div class="status" id="createMessage"></div></form></section><h2 class="section-title">My Wishlists</h2><section id="myWishlists" class="grid"></section><h2 class="section-title">Other Wishlists</h2><section id="otherWishlists" class="grid"></section><section class="card" style="margin-top:18px;"><h2>Join another wishlist</h2><p class="small">Enter the 5-character wishlist code someone has shared with you.</p><div class="form"><input id="joinCode" maxlength="5" placeholder="A9K2P"><button id="joinBtn" class="btn full" type="button">Add wishlist</button><div class="status" id="joinMessage"></div></div></section><nav class="bottom-nav"><a href="home.html">Home</a><a href="wishlists.html" class="active">Lists</a><a href="purchases.html">Bought</a><a href="profile.html">Profile</a></nav></main></body></html>
