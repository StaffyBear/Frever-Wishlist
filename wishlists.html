<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishlists · Frever Wishlist</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/main.css">
<script type="module" src="js/wishlists.js" defer></script>
</head>
<body>
<main class="app">
<a class="back" href="home.html">← Home</a>
<h1 class="page-title">Wishlists</h1>
<p class="page-intro">Your lists are shown separately from wishlists shared by other people.</p>

<section class="card stack">
  <h2 style="margin:0;">Join another wishlist</h2>
  <p class="small">Enter a 5-character wishlist code.</p>
  <input id="joinCode" maxlength="5" placeholder="A9K2P">
  <button id="joinBtn" class="btn full" type="button">Add wishlist</button>
  <div class="status" id="joinMessage"></div>
</section>

<h2 class="section-title">My Wishlists</h2>
<section id="myWishlists" class="grid"></section>

<h2 class="section-title">Other Wishlists</h2>
<section id="otherWishlists" class="grid"></section>
<nav class="bottom-nav">
<a href="home.html" class="">Home</a>
<a href="wishlists.html" class="active">Lists</a>
<a href="purchases.html" class="">Bought</a>
<a href="profile.html" class="">Profile</a>
</nav>
</main>
</body>
</html>
