<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login · Frever Wishlist</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/main.css">
<script type="module" src="js/login.js" defer></script>
</head>
<body>
<main class="app">
<a class="back" href="index.html">← Back</a>
<section class="card auth-card">
  <div class="brand">
    <div class="logo">🐼</div>
    <div><h1>Welcome back</h1><p>Sign in to Frever Wishlist</p></div>
  </div>
  <form class="form" id="loginForm" style="margin-top:18px;">
    <div><label>Email</label><input id="email" type="email" required autocomplete="email"></div>
    <div><label>Password</label><input id="password" type="password" required autocomplete="current-password"></div>
    <button class="btn full" type="submit">Sign in</button>
    <div class="status" id="message"></div>
  </form>
  <p class="small center">No account? <a class="link" href="register.html">Register</a></p>
</section>

</main>
</body>
</html>
