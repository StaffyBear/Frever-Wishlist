<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin · Frever Wishlist</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <script type="module" src="js/app.js" defer></script>
</head>
<body data-page="admin">
  <main class="app-shell">
    
<a class="back-link" href="dashboard.html">← Dashboard</a>
<h1 class="page-title">Admin</h1>
<p class="page-intro">Create registries, wishlists and gift ideas.</p>

<section class="card">
  <h2>Create registry</h2>
  <form class="form" id="registryForm">
    <div>
      <label for="registryName">Registry name</label>
      <input id="registryName" required placeholder="Frever Family Wishlist">
    </div>
    <div>
      <label for="registryCode">Invite code</label>
      <input id="registryCode" required placeholder="FREVER2026">
    </div>
    <button class="btn full" type="submit">Create registry</button>
  </form>
</section>

<br>

<section class="card">
  <h2>Create wishlist</h2>
  <p class="small-text">For now, paste the registry ID from Supabase. We’ll make this a dropdown next.</p>
  <form class="form" id="wishlistForm">
    <div>
      <label for="wishlistRegistryId">Registry ID</label>
      <input id="wishlistRegistryId" required>
    </div>
    <div>
      <label for="wishlistTitle">Wishlist title</label>
      <input id="wishlistTitle" required placeholder="Freddie Christmas 2026">
    </div>
    <div>
      <label for="wishlistPerson">Person name</label>
      <input id="wishlistPerson" required placeholder="Freddie">
    </div>
    <div>
      <label for="wishlistOccasion">Occasion</label>
      <input id="wishlistOccasion" placeholder="Christmas">
    </div>
    <div>
      <label for="wishlistCode">Wishlist code</label>
      <input id="wishlistCode" required placeholder="FREDDIE-XMAS">
    </div>
    <button class="btn full" type="submit">Create wishlist</button>
  </form>
</section>

<br>

<section class="card">
  <h2>Add gift</h2>
  <p class="small-text">For now, paste the wishlist ID from Supabase. We’ll make this a dropdown next.</p>
  <form class="form" id="giftForm">
    <div>
      <label for="giftWishlistId">Wishlist ID</label>
      <input id="giftWishlistId" required>
    </div>
    <div>
      <label for="giftName">Gift name</label>
      <input id="giftName" required placeholder="Wooden train set">
    </div>
    <div>
      <label for="giftCost">Cost</label>
      <input id="giftCost" type="number" step="0.01" placeholder="29.99">
    </div>
    <div>
      <label for="giftQuantity">Quantity</label>
      <input id="giftQuantity" type="number" min="1" value="1">
    </div>
    <div>
      <label for="giftPriority">Priority</label>
      <select id="giftPriority">
        <option>High</option>
        <option>Medium</option>
        <option>Low</option>
        <option selected>N/A</option>
      </select>
    </div>
    <div>
      <label for="giftNotes">Notes</label>
      <textarea id="giftNotes" placeholder="Size, colour, exact version, etc."></textarea>
    </div>
    <button class="btn full" type="submit">Add gift</button>
  </form>
</section>

<div class="status-message" id="adminMessage"></div>

    
    <nav class="bottom-nav">
      <a href="dashboard.html" class="active">Home</a>
      <a href="registries.html" class="">Lists</a>
      <a href="purchases.html" class="">Bought</a>
      <a href="profile.html" class="">Profile</a>
    </nav>
    
  </main>
</body>
</html>
